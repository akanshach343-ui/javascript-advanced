<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Reset default margins */
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  font-family: "Poppins", Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #8e2de2, #ff8c00);
  color: #333;
}

/* Calculator container */
.calculator {
  background-color: white;
  padding: 30px 40px;
  border-radius: 15px;
  box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.2);
  text-align: center;
  width: 320px;
}

/* Heading */
.calculator h2 {
  margin-bottom: 25px;
  color: #4b0082;
}

/* Labels and inputs */
label {
  font-weight: bold;
  display: block;
  margin-top: 15px;
  color: #333;
  text-align: left;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 1rem;
  box-sizing: border-box;
}

/* Button styling */
button {
  margin-top: 25px;
  background-color: #8e2de2;
  color: white;
  border: none;
  padding: 12px 25px;
  font-size: 1rem;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  background-color: #6a0dad;
}

/* Result display */
#result {
  margin-top: 20px;
  font-size: 1.1rem;
  font-weight: bold;
  color: #4b0082;
}

    </style>
</head>

<body>
    <div class="calculator">
        <h2> Simple Interest Calculator</h2>

        <label for="principal"> Principal amount in Rs. </label>
        <input type="number" id="principal" placeholder="Enter principal amount here"><br><br>

        <label for="rate"> Rate in % </label>
        <input type="number" id="rate" placeholder="Enter rate of interest here"><br><br>

        <label for="time"> Time in Years </label>
        <input type="number" id="time" placeholder="Enter time period here"><br> <br><br>

        <button id="calculate"> Calculate </button><br>

        <div id="result"> Simple Interest = </div>
    </div>



</body>
<script type="module" src="main.js"></script>

</html>
