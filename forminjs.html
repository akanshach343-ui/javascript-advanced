<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        /* Reset default margin and padding */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: "Poppins", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #8e2de2, #ff8c00);
        }

        /* Form container */
        form {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.25);
            width: 350px;
            text-align: left;
            transition: all 0.3s ease;
        }

        /* Form hover effect */
        form:hover {
            transform: scale(1.02);
        }

        /* Page heading */
        h2 {
            color: white;
            text-align: center;
            margin-bottom: 15px;
        }

        /* Labels */
        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: #4b0082;
        }

        /* Input fields */
        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: #8e2de2;
            outline: none;
            box-shadow: 0 0 5px rgba(142, 45, 226, 0.5);
        }

        /* Button */
        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background-color: #8e2de2;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #6a0dad;
        }

        /* Message text */
        #message {
            margin-top: 20px;
            font-size: 1rem;
            text-align: center;
            font-weight: bold;
            color: #4b0082;
        }
    </style>

</head>

<body>

    <div>

        <h2>
            <center> Sign up form</center>
        </h2>

        <form id="signup">
            <label for="uname" id="uname">Username</label>
            <input type="text" id="uname" placeholder="Enter your username"> <br> <br>

            <label for="pswrd" id="pswrd">Password</label>
            <input type="password" id="pswrd" placeholder="Enter your password"><br><br>

            <label for="cnfrmpswrd" id="cnfrmpswrd">Confirm Password</label>
            <input type="password" id="cnfrmpswrd" placeholder="Re-enter your password"><br><br>

            <label for="contact" id="contact">Contact No.</label>
            <input type="number" id="contact" placeholder="Enter your phone number"><br><br>

            <!--<input type="button" value="submit">-->

            <button type="submit">Submit your form</button>

            <p id="message"></p>



        </form>
    </div>
    <script src="formjs.js"></script>


</body>

</html>
