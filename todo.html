<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: "Poppins", Arial, sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .container {
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            width: 350px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .container:hover {
            transform: scale(1.02);
        }

        h3 {
            color: #0077b6;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }


        #textinput {
            width: 70%;
            padding: 10px;
            border: 2px solid #66a6ff;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        #textinput:focus {
            border-color: #0077b6;
            box-shadow: 0 0 5px rgba(0, 119, 182, 0.5);
        }


        #addbtn {
            padding: 10px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 8px;
            background-color: #0077b6;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #addbtn:hover {
            background-color: #005f8f;
        }



        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
            text-align: left;
        }

        li {
            background: #f0f8ff;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s;
        }

        li:hover {
            transform: translateY(-3px);
        }


        li button {
            background-color: #ff4d6d;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        li button:hover {
            background-color: #d00000;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3>To Do List</h3>
        <input type="text" id="textinput" placeholder="enter a new task">
        <button id="addbtn">Add Task</button>
        <ul id="tasklist"></ul>
    </div>
</body>
<script src="scrp.js"></script>

</html>
